name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install
        working-directory: ./ci-node-app

      - name: Run build
        run: npm run build
        working-directory: ./ci-node-app

      - name: Run lint
        run: npm run lint
        working-directory: ./ci-node-app

      - name: Run test
        run: npm test -- --coverage
        working-directory: ./ci-node-app

      - name: Upload coverage artifact
        uses: action/upload-artifact@v3
        with:
          name: coverage-report
          path: ./ci-node-app/coverage
