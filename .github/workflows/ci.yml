name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install
        working-directory: ./ci-node-app

      - name: Run build
        run: npm run build
        working-directory: ./ci-node-app

      - name: Run lint
        run: npm run lint
        working-directory: ./ci-node-app

      - name: Run test
        run: npm test
        working-directory: ./ci-node-app
